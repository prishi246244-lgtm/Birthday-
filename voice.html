<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Private Voice Notes</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#000;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
.bg{
    position:fixed;
    inset:0;
    background:url('your-bg-image.jpg') center/cover no-repeat;
    filter:blur(10px);
    transform:scale(1.1);
    z-index:-2;
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.55);
    z-index:-1;
}


.lock-screen{
    width:90%;
    max-width:350px;
    padding:30px;
    border-radius:25px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    text-align:center;
    box-shadow:0 0 30px rgba(255,255,255,0.08);
}

.lock-icon{
    font-size:55px;
    margin-bottom:15px;
}

.title{
    font-size:26px;
    margin-bottom:10px;
    font-weight:bold;
}

.subtitle{
    color:#ccc;
    font-size:14px;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    outline:none;
    font-size:16px;
    text-align:center;
    margin-bottom:18px;
    background:rgba(255,255,255,0.12);
    color:white;
}

input::placeholder{
    color:#bbb;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    background:white;
    color:black;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.03);
}

/* Voice Section */
.voice-section{
    display:none;
    width:100%;
    min-height:100vh;
    padding:25px;
    overflow-y:auto;
}

.voice-title{
    text-align:center;
    font-size:30px;
    margin-bottom:35px;
}

.voice-card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border-radius:22px;
    padding:20px;
    margin-bottom:22px;
}

.voice-card h3{
    margin-bottom:15px;
    font-size:18px;
}

audio{
    width:100%;
}

.error{
    color:#ff8f8f;
    margin-top:15px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<!-- LOCK SCREEN -->
<div class="lock-screen" id="lockScreen">

    <div class="lock-icon">🔒</div>

    <div class="title">Private Voice Notes</div>

    <div class="subtitle">
        Enter password to continue
    </div>

    <input type="password" id="passwordInput" placeholder="Enter Password">

    <button onclick="unlockVoiceNotes()">
        Unlock
    </button>

    <div class="error" id="errorText"></div>

</div>

<!-- VOICE NOTES -->
<div class="voice-section" id="voiceSection">

    <div class="voice-title">
        🎧 Voice Notes
    </div>

    <div class="voice-card">
        <h3>Voice Note 1</h3>
        <audio controls>
            <source src="voice.mp3" type="audio/mp3">
        </audio>


</div>

<script>

function unlockVoiceNotes(){

    const password = document.getElementById("passwordInput").value;

    const correctPassword ="prince143" ;

    if(password === correctPassword){

        document.getElementById("lockScreen").style.display = "none";

        document.getElementById("voiceSection").style.display = "block";

    }else{

        document.getElementById("errorText").innerText = "Wrong Password";

    }
}

</script>

</body>
  </html>
