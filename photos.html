<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Photos ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:linear-gradient(to bottom,#ffe6f0,#ffdce5);
    font-family:sans-serif;
    text-align:center;
    overflow-x:hidden;
}

h1{
    padding:20px;
    font-size:32px;
    color:#7a2b4f;
}

.photo-feed{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:25px;
    padding-bottom:40px;
}

.photo-feed img{
    width:95vw;
    height:90vh;
    object-fit:cover;
    border-radius:22px;
    box-shadow:0 6px 18px rgba(0,0,0,0.25);
}

.back-btn{
    display:inline-block;
    margin:25px;
    padding:12px 28px;
    background:#ff4f81;
    color:white;
    text-decoration:none;
    border-radius:30px;
    font-size:18px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<h1>Our Memories 📸</h1>

<div class="photo-feed">

<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
<img src="photo4.jpg">
<img src="photo5.jpg">
<img src="photo6.jpg">

</div>

<a href="index.html" class="back-btn">← Back</a>

</body>
</html>
